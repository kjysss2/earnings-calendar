name: Transcript 링크 자동 업데이트

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Notion Transcript 링크 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: d2c2cff2-91cc-82ac-ac28-0153506c607c
        run: python scripts/update_links.py

      - name: 변경사항 커밋
        run: |
          git config user.name "earnings-bot"
          git config user.email "actions@github.com"
          git add data/notion-transcripts.json
          git diff --cached --quiet || git commit -m "자동 업데이트: Notion Transcript 링크"
          git push
