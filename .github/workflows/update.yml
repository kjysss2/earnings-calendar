name: 실적자료 자동 업데이트

on:
  schedule:
    - cron: "0 */3 * * *"   # 3시간마다 확인
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 링크 업데이트 실행
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/update_links.py

      - name: 변경사항 커밋
        run: |
          git config user.name "earnings-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "자동 업데이트: IR자료/스크립트 링크"
          git push
