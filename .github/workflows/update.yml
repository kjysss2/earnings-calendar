name: Transcript 링크 자동 업데이트

on:
  schedule:
    # UTC 기준 매시 7분, 37분 = 30분 간격
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notion-transcript-sync
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Notion 설정 확인
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::error::GitHub Secret NOTION_TOKEN이 없습니다."
            exit 1
          fi

          if [ -z "$NOTION_DATABASE_ID" ]; then
            echo "::error::GitHub Secret NOTION_DATABASE_ID가 없습니다."
            exit 1
          fi

      - name: Notion Transcript 링크 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/update_links.py

      - name: 변경사항 커밋
        run: |
          if git diff --quiet -- data/notion-transcripts.json; then
            echo "Transcript 링크 변경 없음"
            exit 0
          fi

          git config user.name "earnings-bot"
          git config user.email "actions@github.com"

          git add data/notion-transcripts.json
          git commit -m "자동 업데이트: Notion Transcript 링크"

          git pull --rebase origin main
          git push origin main
