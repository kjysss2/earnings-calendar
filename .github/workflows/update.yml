name: Transcript 링크 자동 업데이트

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update.yml
  schedule:
    # GitHub Actions 혼잡 시간대를 피해 매시 7분과 37분에 실행
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notion-transcript-sync
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: NOTION_TOKEN 확인
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::error::GitHub Actions Secret에 NOTION_TOKEN이 없습니다."
            exit 1
          fi

      - name: Notion Transcript 링크 업데이트
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: d2c2cff2-91cc-82ac-ac28-0153506c607c
        run: python scripts/update_links.py

      - name: 변경사항 저장
        run: |
          if git diff --quiet -- data/notion-transcripts.json; then
            echo "변경된 Transcript 링크가 없습니다."
            exit 0
          fi

          git config user.name "earnings-bot"
          git config user.email "actions@github.com"

          git add data/notion-transcripts.json
          git commit -m "자동 업데이트: Notion Transcript 링크"

          git pull --rebase origin main
          git push origin HEAD:main
